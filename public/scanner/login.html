<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Login — Fuel QR</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/"><span class="brand-badge">Thizzz Boy</span></a>
    </div>
    <div class="nav-links">
      <a href="/">← Back to Portals</a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h2>Operator Login</h2>
      <p class="auth-subtitle">Sign in to the QR Scanning Portal</p>

      <div id="errorAlert" class="alert alert-error hidden"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="operator@fuel.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
      </form>

      <p class="text-center mt-2" style="color: var(--text-muted); font-size: 0.8rem;">
        Default: operator@fuel.com / operator123
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    if (getToken() && getUser()?.role === 'operator') {
      location.href = '/scanner/dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const data = await apiFetch('/auth/operator/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        saveAuth(data);
        location.href = '/scanner/dashboard.html';
      } catch (err) {
        errorAlert.textContent = err.message;
        errorAlert.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
